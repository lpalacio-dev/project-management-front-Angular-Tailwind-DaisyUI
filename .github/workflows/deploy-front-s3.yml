name: Deploy Frontend

on:
  push:
    branches:
      - develop
      - prod
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # 1. Mapeamos la rama al entorno de GitHub
    environment: ${{ github.ref_name == 'prod' && 'production' || 'development' }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Build
        run: npm run build

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Los secrets también se toman del environment automáticamente
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy a S3 e Invalidation
        # Mantenemos tu lógica de ejecución, pero usamos las variables del entorno
        if: github.ref_name == 'develop' || (github.ref_name == 'prod' && github.event_name != 'push')
        run: |
          aws s3 sync dist/project-management-front/browser/ s3://${{ vars.S3_BUCKET }}/ --delete
          aws cloudfront create-invalidation --distribution-id ${{ vars.DISTRIBUTION_ID }} --paths "/*"